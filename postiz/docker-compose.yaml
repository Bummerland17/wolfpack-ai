services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: always
    environment:
      # === Required Settings
      MAIN_URL: 'http://103.98.214.106:4007'
      FRONTEND_URL: 'http://103.98.214.106:4007'
      NEXT_PUBLIC_BACKEND_URL: 'http://103.98.214.106:4007/api'
      JWT_SECRET: 'postiz-jwt-secret-pantrymate-2026-wolfpack-x9k2m'
      DATABASE_URL: 'postgresql://postiz-user:postiz-password@postiz-postgres:5432/postiz-db-local'
      REDIS_URL: 'redis://postiz-redis:6379'
      BACKEND_INTERNAL_URL: 'http://localhost:3000'
      TEMPORAL_ADDRESS: "temporal:7233"
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: 'false'
      RUN_CRON: 'true'

      # === Storage Settings
      STORAGE_PROVIDER: 'local'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'

      # === Cloudflare (R2) Settings
      # STORAGE_PROVIDER: 'cloudflare'
      # CLOUDFLARE_ACCOUNT_ID: 'your-account-id'
      # CLOUDFLARE_ACCESS_KEY: 'your-access-key'
      # CLOUDFLARE_SECRET_ACCESS_KEY: 'your-secret-access-key'
      # CLOUDFLARE_BUCKETNAME: 'your-bucket-name'
      # CLOUDFLARE_BUCKET_URL: 'https://your-bucket-url.r2.cloudflarestorage.com/'
      # CLOUDFLARE_REGION: 'auto'

      # === Social Media API Settings
      # ---------------------------------------------------------------
      # POSTIZ CALLBACK URLS (use these when creating developer apps):
      #   X/Twitter:  http://103.98.214.106:4007/integrations/social/x/callback
      #   LinkedIn:   http://103.98.214.106:4007/integrations/social/linkedin/callback
      #   Facebook:   http://103.98.214.106:4007/integrations/social/facebook/callback
      #   Instagram:  http://103.98.214.106:4007/integrations/social/instagram/callback
      #   TikTok:     http://103.98.214.106:4007/integrations/social/tiktok/callback
      #   Pinterest:  http://103.98.214.106:4007/integrations/social/pinterest/callback
      #   YouTube:    http://103.98.214.106:4007/integrations/social/youtube/callback
      # ---------------------------------------------------------------
      # X / TWITTER — FREE TIER HAS NO WRITE ACCESS. Requires Basic ($100/mo) or above.
      # Create app at: https://developer.twitter.com/en/portal/dashboard
      # Permissions needed: Read + Write. Enable OAuth 2.0 with PKCE.
      X_API_KEY: 'YkxSUjdkcWN6eTRyZjZEaEpIUnc6MTpjaQ'
      X_API_SECRET: 'n3IfJdpmnn6yQlCo1iwr5tnr_9p0EYKObO_K9LWx8sqGejYigv'
      # LINKEDIN — FREE developer access. Requires "Share on LinkedIn" product approval.
      # Create app at: https://www.linkedin.com/developers/apps/new
      # Scopes needed: w_member_social, r_basicprofile
      LINKEDIN_CLIENT_ID: 'PLACEHOLDER_LINKEDIN_CLIENT_ID'
      LINKEDIN_CLIENT_SECRET: 'PLACEHOLDER_LINKEDIN_CLIENT_SECRET'
      # REDDIT — FREE developer access.
      # Create app at: https://www.reddit.com/prefs/apps
      REDDIT_CLIENT_ID: ''
      REDDIT_CLIENT_SECRET: ''
      # GITHUB — Not needed for social posting.
      GITHUB_CLIENT_ID: ''
      GITHUB_CLIENT_SECRET: ''
      BEEHIIVE_API_KEY: ''
      BEEHIIVE_PUBLICATION_ID: ''
      # THREADS — Requires Facebook developer app (same app as Instagram).
      THREADS_APP_ID: '218029166130619'
      THREADS_APP_SECRET: 'eb8266b692fe0dfa94556ce044b43338'
      # FACEBOOK + INSTAGRAM — FREE developer access. Same Meta app covers both.
      # Create app at: https://developers.facebook.com/apps/creation/
      # App type: Business. Add products: Facebook Login + Instagram Graph API
      # Permissions: pages_manage_posts, pages_read_engagement, instagram_basic,
      #              instagram_content_publish, instagram_manage_insights
      FACEBOOK_APP_ID: '218029166130619'
      INSTAGRAM_APP_ID: '1535700575227366'
      INSTAGRAM_APP_SECRET: 'e71e85a02b06237280f2b57ea509caa2'
      FACEBOOK_APP_SECRET: 'eb8266b692fe0dfa94556ce044b43338'
      # YOUTUBE — FREE developer access via Google Cloud Console.
      # Create at: https://console.cloud.google.com → APIs & Services → Credentials
      # Enable: YouTube Data API v3. Scopes: https://www.googleapis.com/auth/youtube.upload
      YOUTUBE_CLIENT_ID: 'PLACEHOLDER_YOUTUBE_CLIENT_ID'
      YOUTUBE_CLIENT_SECRET: 'PLACEHOLDER_YOUTUBE_CLIENT_SECRET'
      # TIKTOK — FREE developer access BUT approval takes 2-6 weeks.
      # Create at: https://developers.tiktok.com → Manage apps
      # Scopes: video.publish, video.upload, user.info.basic
      # NOTE: Buffer/Postiz have pre-approved TikTok credentials.
      # Connect TikTok directly via Postiz OAuth without creating your own TikTok app.
      TIKTOK_CLIENT_ID: 'PLACEHOLDER_TIKTOK_CLIENT_ID'
      TIKTOK_CLIENT_SECRET: 'PLACEHOLDER_TIKTOK_CLIENT_SECRET'
      # PINTEREST — FREE developer access, fastest approval of all platforms.
      # Create at: https://developers.pinterest.com/apps/
      # Scopes: boards:read, pins:read, pins:write
      PINTEREST_CLIENT_ID: 'PLACEHOLDER_PINTEREST_CLIENT_ID'
      PINTEREST_CLIENT_SECRET: 'PLACEHOLDER_PINTEREST_CLIENT_SECRET'
      DRIBBBLE_CLIENT_ID: ''
      DRIBBBLE_CLIENT_SECRET: ''
      DISCORD_CLIENT_ID: ''
      DISCORD_CLIENT_SECRET: ''
      DISCORD_BOT_TOKEN_ID: ''
      SLACK_ID: ''
      SLACK_SECRET: ''
      SLACK_SIGNING_SECRET: ''
      MASTODON_URL: 'https://mastodon.social'
      MASTODON_CLIENT_ID: ''
      MASTODON_CLIENT_SECRET: ''

      # === OAuth & Authentik Settings
      # NEXT_PUBLIC_POSTIZ_OAUTH_DISPLAY_NAME: 'Authentik'
      # NEXT_PUBLIC_POSTIZ_OAUTH_LOGO_URL: 'https://raw.githubusercontent.com/walkxcode/dashboard-icons/master/png/authentik.png'
      # POSTIZ_GENERIC_OAUTH: 'false'
      # POSTIZ_OAUTH_URL: 'https://auth.example.com'
      # POSTIZ_OAUTH_AUTH_URL: 'https://auth.example.com/application/o/authorize'
      # POSTIZ_OAUTH_TOKEN_URL: 'https://auth.example.com/application/o/token'
      # POSTIZ_OAUTH_USERINFO_URL: 'https://authentik.example.com/application/o/userinfo'
      # POSTIZ_OAUTH_CLIENT_ID: ''
      # POSTIZ_OAUTH_CLIENT_SECRET: ''
      # POSTIZ_OAUTH_SCOPE: "openid profile email"  # Optional: uncomment to override default scope

      # === Sentry

      # NEXT_PUBLIC_SENTRY_DSN: 'http://spotlight:8969/stream'
      # SENTRY_SPOTLIGHT: '1'

      # === Misc Settings
      OPENAI_API_KEY: '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'
      NEXT_PUBLIC_DISCORD_SUPPORT: ''
      NEXT_PUBLIC_POLOTNO: ''
      API_LIMIT: 30

      # === Payment / Stripe Settings
      FEE_AMOUNT: 0.05
      STRIPE_PUBLISHABLE_KEY: ''
      STRIPE_SECRET_KEY: ''
      STRIPE_SIGNING_KEY: ''
      STRIPE_SIGNING_KEY_CONNECT: ''

      # === Developer Settings
      NX_ADD_PLUGINS: false

      # === Short Link Service Settings (Optional - leave blank if unused)
      # DUB_TOKEN: ""
      # DUB_API_ENDPOINT: "https://api.dub.co"
      # DUB_SHORT_LINK_DOMAIN: "dub.sh"
      # SHORT_IO_SECRET_KEY: ""
      # KUTT_API_KEY: ""
      # KUTT_API_ENDPOINT: "https://kutt.it/api/v2"
      # KUTT_SHORT_LINK_DOMAIN: "kutt.it"
      # LINK_DRIP_API_KEY: ""
      # LINK_DRIP_API_ENDPOINT: "https://api.linkdrip.com/v1/"
      # LINK_DRIP_SHORT_LINK_DOMAIN: "dripl.ink"

    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "4007:5000"
    networks:
      - postiz-network
      - temporal-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db-local
      interval: 10s
      timeout: 3s
      retries: 3
  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  # For Application Monitoring / Debugging
  spotlight:
    pull_policy: always
    container_name: spotlight
    ports:
      - 8969:8969/tcp
    image: ghcr.io/getsentry/spotlight:latest
    networks:
      - postiz-network

  # -----------------------
  # Temporal Stack
  # -----------------------
  temporal-elasticsearch:
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - 9200
    volumes:
      - /var/lib/elasticsearch/data

  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-network
    expose:
      - 5432
    volumes:
      - /var/lib/postgresql/data

  temporal:
    container_name: temporal
    ports:
      - '7233:7233'
    image: temporalio/auto-setup:1.28.1
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - temporal-network
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig
    labels:
      kompose.volume.type: configMap

  temporal-admin-tools:
    container_name: temporal-admin-tools
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    networks:
      - temporal-network
    stdin_open: true
    depends_on:
      - temporal
    tty: true

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.34.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - temporal-network
    ports:
      - '8080:8080'

volumes:
  postgres-volume:
    external: false

  postiz-redis-data:
    external: false

  postiz-config:
    external: false

  postiz-uploads:
    external: false

networks:
  postiz-network:
    external: false
  temporal-network:
    driver: bridge
    name: temporal-network
